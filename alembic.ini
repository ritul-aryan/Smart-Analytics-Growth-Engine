# alembic.ini
# Run migrations from the project root: alembic upgrade head
# The database URL is resolved at runtime in backend/migrations/env.py
# from the frozen Settings instance — do not set sqlalchemy.url here.

[alembic]
# Path to migration scripts, relative to project root (where alembic is run)
script_location = backend/migrations

# Migration file naming: timestamp_slug.py  e.g. 20260626_0001_initial_schema.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone used in migration file timestamps
timezone = UTC

# Maximum length of the slug portion of the filename
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
# even if no autogenerate directives are present.
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
# to be detected as revisions.
sourceless = false

# Version number format used by "History" display
version_path_separator = os

# Output encoding for migration scripts
output_encoding = utf-8

# sqlalchemy.url is intentionally omitted — see backend/migrations/env.py
# which reads the URL from backend.config.get_settings().active_database_url

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
